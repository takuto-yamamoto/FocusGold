<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusGold</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE44D;
    --orange: #FF7A3D;
    --pink: #FF4F9B;
    --cyan: #00E5FF;
    --green: #3DFF8F;
    --purple: #C084FC;
    --bg: #FFF8E8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* グリッド背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,180,0,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,180,0,0.09) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* バブル */
  .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.22;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(1) rotate(0deg); opacity: 0.22; }
    80%  { opacity: 0.22; }
    100% { transform: translateY(-20vh) scale(1.3) rotate(360deg); opacity: 0; }
  }

  /* 星 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation: twinkle ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50%       { opacity: 0.75; transform: scale(1.5) rotate(180deg); }
  }

  /* パーティクル */
  .particles-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .particle {
    position: absolute;
    animation: particleBurst ease-out forwards;
    border: 2px solid #222;
  }
  @keyframes particleBurst {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
  }

  /* コンテナ */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 24px;
  }

  /* タイトル */
  .title-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }

  h1 {
    font-family: 'Lilita One', cursive;
    font-size: clamp(3rem, 10vw, 6.5rem);
    letter-spacing: 6px;
    background: linear-gradient(90deg, #FF4F9B, #FF7A3D, #FFE44D, #3DFF8F, #00E5FF, #C084FC, #FF4F9B);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.2));
    animation: rainbowShift 3s linear infinite, titleFloat 2.5s ease-in-out infinite;
  }
  @keyframes rainbowShift {
    0%   { background-position: 0% center; }
    100% { background-position: 300% center; }
  }
  @keyframes titleFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-10px) scale(1.03); }
  }

  .subtitle {
    font-size: 0.75rem;
    font-weight: 900;
    color: #bbb;
    letter-spacing: 7px;
    text-transform: uppercase;
  }

  /* カード行 */
  .cards-row {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .result-card {
    border: 4px solid #222;
    border-radius: 28px;
    box-shadow: 8px 8px 0 #222;
    width: 210px;
    height: 245px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.38) 0%, transparent 55%);
    pointer-events: none;
    z-index: 1;
  }
  .result-card::after {
    content: '';
    position: absolute;
    top: -60%; left: -70%;
    width: 55%; height: 220%;
    background: rgba(255,255,255,0.28);
    transform: skewX(-20deg);
    transition: left 0.6s ease;
    pointer-events: none;
    z-index: 2;
  }
  .result-card:hover::after { left: 140%; }

  .result-card.card-a { background: linear-gradient(145deg, #FFE44D 0%, #FF7A3D 100%); }
  .result-card.card-b { background: linear-gradient(145deg, #00E5FF 0%, #3DFF8F 100%); }

  .result-card.spinning {
    animation: cardFlip 0.55s cubic-bezier(0.36,0.07,0.19,0.97);
  }
  @keyframes cardFlip {
    0%   { transform: rotateY(0) scale(1); }
    30%  { transform: rotateY(90deg) scale(0.72); }
    60%  { transform: rotateY(210deg) scale(0.72); }
    80%  { transform: rotateY(345deg) scale(1.1); }
    100% { transform: rotateY(360deg) scale(1); }
  }

  .result-card.pop {
    animation: cardPop 0.45s cubic-bezier(0.34,1.76,0.64,1);
  }
  @keyframes cardPop {
    0%   { transform: scale(0.82); }
    60%  { transform: scale(1.14); }
    100% { transform: scale(1); }
  }

  .card-label {
    font-size: 0.78rem;
    font-weight: 900;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.55);
    padding: 3px 14px;
    border-radius: 20px;
    border: 2px solid rgba(0,0,0,0.12);
    position: relative;
    z-index: 3;
  }

  .number-display {
    font-family: 'Lilita One', cursive;
    font-size: 5.8rem;
    color: #222;
    line-height: 1;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.13);
    position: relative;
    z-index: 3;
  }
  .number-display.rolling {
    animation: numRoll 0.07s steps(1) infinite;
  }
  @keyframes numRoll {
    0%   { transform: scale(1.18) translateY(-7px); }
    100% { transform: scale(0.82) translateY(7px); }
  }

  .direction-display {
    font-size: 1.35rem;
    font-weight: 900;
    color: #333;
    background: rgba(255,255,255,0.65);
    padding: 5px 18px;
    border-radius: 20px;
    border: 2.5px solid #222;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 3;
  }

  /* VS */
  .vs-badge {
    font-family: 'Lilita One', cursive;
    font-size: 1.8rem;
    color: white;
    background: linear-gradient(135deg, #FF4F9B, #C084FC);
    border: 4px solid #222;
    border-radius: 50%;
    width: 66px; height: 66px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 5px 5px 0 #222;
    animation: vsPulse 1.4s ease-in-out infinite;
  }
  @keyframes vsPulse {
    0%, 100% { transform: scale(1) rotate(-8deg); box-shadow: 5px 5px 0 #222; }
    50%       { transform: scale(1.22) rotate(8deg); box-shadow: 9px 9px 0 #222; }
  }

  /* ボタン */
  .generate-btn {
    font-family: 'Lilita One', cursive;
    font-size: 1.6rem;
    color: #fff;
    background: linear-gradient(135deg, #FF4F9B, #FF7A3D);
    border: 4px solid #222;
    border-radius: 60px;
    padding: 20px 72px;
    cursor: pointer;
    box-shadow: 7px 7px 0 #222;
    position: relative;
    overflow: hidden;
    letter-spacing: 2px;
    transition: transform 0.12s, box-shadow 0.12s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.25);
  }
  .generate-btn:hover:not(:disabled) {
    transform: translate(-3px,-3px);
    box-shadow: 10px 10px 0 #222;
  }
  .generate-btn:active:not(:disabled) {
    transform: translate(5px,5px);
    box-shadow: 2px 2px 0 #222;
  }
  .generate-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .generate-btn .shine {
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 220%;
    background: rgba(255,255,255,0.32);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
    pointer-events: none;
  }
  .generate-btn:hover:not(:disabled) .shine { left: 135%; }

  /* ファイト！！バナー */
  .fight-banner {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
  }
  .fight-banner.show { animation: fightShow 2.2s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes fightShow {
    0%   { opacity: 0; transform: scale(0.2) rotate(-15deg); }
    14%  { opacity: 1; transform: scale(1.3) rotate(5deg); }
    28%  { transform: scale(0.93) rotate(-2deg); }
    42%  { transform: scale(1.1) rotate(2deg); }
    56%  { transform: scale(1) rotate(0deg); opacity: 1; }
    78%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5) rotate(8deg); }
  }
  .fight-text {
    font-family: 'Lilita One', cursive;
    font-size: clamp(4.5rem, 17vw, 11rem);
    color: #FFE44D;
    -webkit-text-stroke: 6px #222;
    text-shadow: 8px 8px 0 #FF4F9B, 16px 16px 0 #222;
    letter-spacing: 4px;
    white-space: nowrap;
    filter: drop-shadow(0 0 40px rgba(255,228,77,0.9));
  }

  /* ヒント */
  .hint-text {
    font-size: 1rem;
    font-weight: 900;
    color: #999;
    letter-spacing: 1px;
    min-height: 1.5em;
    transition: color 0.3s;
  }
  .hint-text.result {
    color: #FF4F9B;
    font-size: 1.1rem;
    animation: hintPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes hintPop {
    0%   { transform: scale(0.78); }
    100% { transform: scale(1); }
  }

  /* フラッシュ */
  .flash {
    position: fixed; inset: 0;
    background: white;
    z-index: 400;
    pointer-events: none;
    opacity: 0;
  }
  .flash.go { animation: flashOut 0.38s ease-out forwards; }
  @keyframes flashOut {
    0%   { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* 紙吹雪 */
  .confetti-piece {
    position: fixed;
    top: -20px;
    pointer-events: none;
    z-index: 600;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scaleX(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--spin)) scaleX(var(--flip)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>
<div class="stars" id="stars"></div>
<div class="particles-container" id="particles"></div>
<div class="flash" id="flash"></div>
<div class="fight-banner" id="fightBanner"><span class="fight-text">ファイト！！</span></div>

<div class="container">
  <div class="title-wrap">
    <h1>FocusGold</h1>
    <div class="subtitle">Random Generator</div>
  </div>

  <div class="cards-row">
    <div class="result-card card-a" id="cardA">
      <div class="card-label">一問目</div>
      <div class="number-display" id="numA">?</div>
      <div class="direction-display">
        <span id="arrowA">❓</span>
        <span id="dirTextA">?</span>
      </div>
    </div>

    <div class="vs-badge">VS</div>

    <div class="result-card card-b" id="cardB">
      <div class="card-label">二問目</div>
      <div class="number-display" id="numB">?</div>
      <div class="direction-display">
        <span id="arrowB">❓</span>
        <span id="dirTextB">?</span>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">
    <span class="shine"></span>
    🎰 生成する！
  </button>

  <p class="hint-text" id="hintText">ボタンを押してランダム生成！</p>
</div>

<script>
  const palette = ['#FFE44D','#FF7A3D','#FF4F9B','#00E5FF','#3DFF8F','#C084FC'];

  // バブル
  const bubblesEl = document.getElementById('bubbles');
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 90 + 25;
    b.style.cssText = `width:${size}px;height:${size}px;background:${palette[i%palette.length]};left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*12}s;border:2px solid rgba(0,0,0,0.06)`;
    bubblesEl.appendChild(b);
  }

  // 星
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*12+5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:${palette[Math.floor(Math.random()*palette.length)]};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*4}s;`;
    starsEl.appendChild(s);
  }

  // パーティクル爆発
  function spawnParticles(x, y, count=38) {
    const container = document.getElementById('particles');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random()*17+6;
      const angle = (360/count)*i + Math.random()*15;
      const dist = Math.random()*230+90;
      const tx = Math.cos(angle*Math.PI/180)*dist;
      const ty = Math.sin(angle*Math.PI/180)*dist;
      const rot = Math.random()*720-360;
      const br = ['50%','0%','4px'][Math.floor(Math.random()*3)];
      p.style.cssText = `width:${size}px;height:${size}px;background:${palette[Math.floor(Math.random()*palette.length)]};left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;border-radius:${br};animation-duration:${Math.random()*0.5+0.65}s;animation-delay:${Math.random()*0.08}s;`;
      container.appendChild(p);
      setTimeout(() => p.remove(), 1300);
    }
  }

  // 紙吹雪
  function spawnConfetti() {
    const colors = [...palette, '#fff', '#222'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const w = Math.random()*13+5, h = Math.random()*22+8;
        c.style.cssText = `left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};--spin:${Math.random()*1080-540}deg;--flip:${Math.random()<0.5?-1:1};animation-duration:${Math.random()*1.6+1.1}s;border:1.5px solid rgba(0,0,0,0.13);border-radius:${Math.random()<0.3?'50%':'3px'};`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }, Math.random()*700);
    }
  }

  // フラッシュ
  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  }

  // ファイト！！
  function showFight() {
    const b = document.getElementById('fightBanner');
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
  }

  // ===== メイン =====
  let rolling = false;

  function generate() {
    if (rolling) return;
    rolling = true;

    const btn     = document.getElementById('generateBtn');
    const numAEl  = document.getElementById('numA');
    const numBEl  = document.getElementById('numB');
    const arrowA  = document.getElementById('arrowA');
    const arrowB  = document.getElementById('arrowB');
    const dirA    = document.getElementById('dirTextA');
    const dirB    = document.getElementById('dirTextB');
    const cardA   = document.getElementById('cardA');
    const cardB   = document.getElementById('cardB');
    const hint    = document.getElementById('hintText');

    btn.disabled = true;
    hint.classList.remove('result');
    hint.textContent = '🎰 生成中...';

    ['spinning','pop'].forEach(c => { cardA.classList.remove(c); cardB.classList.remove(c); });
    void cardA.offsetWidth;
    cardA.classList.add('spinning');
    cardB.classList.add('spinning');
    setTimeout(() => { cardA.classList.remove('spinning'); cardB.classList.remove('spinning'); }, 560);

    numAEl.classList.add('rolling');
    numBEl.classList.add('rolling');
    arrowA.textContent = '❓'; arrowB.textContent = '❓';
    dirA.textContent = '...'; dirB.textContent = '...';

    let count = 0;
    const iv = setInterval(() => {
      numAEl.textContent = Math.floor(Math.random()*7)+1;
      numBEl.textContent = Math.floor(Math.random()*7)+1;
      if (++count > 24) { clearInterval(iv); finalize(); }
    }, 52);

    function finalize() {
      numAEl.classList.remove('rolling');
      numBEl.classList.remove('rolling');

      const nA = Math.floor(Math.random()*7)+1;
      const nB = Math.floor(Math.random()*7)+1;
      const dA = Math.random()<0.5 ? '上' : '下';
      const dB = Math.random()<0.5 ? '上' : '下';

      numAEl.textContent = nA; numBEl.textContent = nB;
      arrowA.textContent = dA==='上'?'⬆️':'⬇️';
      arrowB.textContent = dB==='上'?'⬆️':'⬇️';
      dirA.textContent = dA; dirB.textContent = dB;

      void cardA.offsetWidth;
      cardA.classList.add('pop'); cardB.classList.add('pop');

      const aR = cardA.getBoundingClientRect();
      const bR = cardB.getBoundingClientRect();
      const btnR = btn.getBoundingClientRect();

      flashScreen();
      spawnParticles(aR.left+aR.width/2, aR.top+aR.height/2, 42);
      setTimeout(() => spawnParticles(bR.left+bR.width/2, bR.top+bR.height/2, 42), 110);
      setTimeout(() => spawnParticles(btnR.left+btnR.width/2, btnR.top+btnR.height/2, 28), 220);
      setTimeout(spawnConfetti, 180);
      setTimeout(showFight, 320);

      hint.textContent = `一問目: ${nA}-${dA}　二問目: ${nB}-${dB}`;
      setTimeout(() => hint.classList.add('result'), 60);

      btn.disabled = false;
      rolling = false;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); generate(); }
  });
</script>
</body>
</html>
