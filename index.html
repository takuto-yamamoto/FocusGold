<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FocusGold</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --yellow:#FFE44D; --orange:#FF7A3D; --pink:#FF4F9B;
    --cyan:#00E5FF;   --green:#3DFF8F;  --purple:#C084FC;
    --bg:#FFF8E8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overscroll-behavior:none;}

  body{
    font-family:'Nunito',sans-serif;
    background:var(--bg);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
  }

  /* ====== 背景グリッド ====== */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(255,180,0,.09)1px,transparent 1px),linear-gradient(90deg,rgba(255,180,0,.09)1px,transparent 1px);
    background-size:36px 36px;z-index:0;pointer-events:none;
  }

  /* ====== 背景ネオンリング ====== */
  .bg-rings{position:fixed;inset:0;pointer-events:none;z-index:0;display:flex;align-items:center;justify-content:center;}
  .bg-ring{
    position:absolute;border-radius:50%;
    border:3px solid transparent;
    animation:ringPulse linear infinite;
  }
  @keyframes ringPulse{
    0%  {transform:scale(.3);opacity:.8;}
    100%{transform:scale(3);opacity:0;}
  }

  /* ====== バブル ====== */
  .bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .bubble{position:absolute;border-radius:50%;opacity:.22;animation:floatUp linear infinite;}
  @keyframes floatUp{
    0%  {transform:translateY(110vh)scale(1)rotate(0deg);opacity:.22;}
    80% {opacity:.22;}
    100%{transform:translateY(-20vh)scale(1.3)rotate(360deg);opacity:0;}
  }

  /* ====== 星 ====== */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{
    position:absolute;
    clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation:twinkle ease-in-out infinite;opacity:0;
  }
  @keyframes twinkle{
    0%,100%{opacity:0;transform:scale(.5)rotate(0deg);}
    50%    {opacity:.9;transform:scale(1.8)rotate(180deg);}
  }

  /* ====== レーザービーム ====== */
  .lasers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .laser{
    position:absolute;height:2px;
    background:linear-gradient(90deg,transparent,rgba(255,228,77,.9),transparent);
    animation:laserSweep linear infinite;
    transform-origin:left center;
  }
  @keyframes laserSweep{
    0%  {transform:translateX(-100%);}
    100%{transform:translateX(200vw);}
  }

  /* ====== パーティクル ====== */
  .particles-container{position:fixed;inset:0;pointer-events:none;z-index:999;}
  .particle{position:absolute;animation:particleBurst ease-out forwards;border:2px solid #222;}
  @keyframes particleBurst{
    0%  {transform:translate(0,0)scale(1)rotate(0deg);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty))scale(0)rotate(var(--rot));opacity:0;}
  }

  /* ====== メインコンテナ ====== */
  .container{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;
    gap:clamp(14px,3.5vw,28px);
    padding:clamp(12px,3vw,24px);
    width:100%;max-width:620px;
  }

  /* ====== タイトル ====== */
  .title-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}

  h1{
    font-family:'Lilita One',cursive;
    font-size:clamp(2.8rem,13vw,7rem);
    letter-spacing:clamp(2px,1vw,8px);
    background:linear-gradient(90deg,#FF4F9B,#FF7A3D,#FFE44D,#3DFF8F,#00E5FF,#C084FC,#FF4F9B);
    background-size:300% auto;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 20px rgba(255,120,60,.7)) drop-shadow(4px 4px 0 rgba(0,0,0,.2));
    animation:rainbowShift 2.5s linear infinite,titleFloat 2.5s ease-in-out infinite;
  }
  /* タイトル周りのグロー */
  .title-glow{
    position:absolute;inset:-20px;
    background:radial-gradient(ellipse,rgba(255,228,77,.25),transparent 70%);
    animation:glowPulse 2s ease-in-out infinite;
    pointer-events:none;
    z-index:-1;
  }
  @keyframes glowPulse{
    0%,100%{transform:scale(1);opacity:.7;}
    50%    {transform:scale(1.15);opacity:1;}
  }
  @keyframes rainbowShift{
    0%  {background-position:0% center;}
    100%{background-position:300% center;}
  }
  @keyframes titleFloat{
    0%,100%{transform:translateY(0)scale(1);}
    50%    {transform:translateY(-10px)scale(1.03);}
  }

  .subtitle{
    font-size:clamp(.55rem,2vw,.75rem);font-weight:900;color:#bbb;
    letter-spacing:clamp(4px,1.5vw,7px);text-transform:uppercase;
  }

  /* ====== カード行 ====== */
  .cards-row{
    display:flex;flex-direction:row;
    gap:clamp(10px,2.5vw,36px);
    align-items:center;justify-content:center;width:100%;
  }
  @media(max-width:480px){
    .cards-row{flex-direction:column;gap:14px;}
  }

  /* ====== カード ====== */
  .result-card{
    border:4px solid #222;
    border-radius:clamp(18px,4vw,28px);
    box-shadow:6px 6px 0 #222;
    width:clamp(145px,36vw,205px);
    height:clamp(165px,40vw,240px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(5px,1.2vw,9px);
    position:relative;overflow:hidden;flex-shrink:0;
    transition:box-shadow .15s;
  }
  @media(max-width:480px){
    .result-card{width:min(290px,82vw);height:175px;flex-direction:row;gap:14px;padding:0 18px;border-radius:22px;}
    .card-inner{display:flex;flex-direction:column;align-items:center;gap:5px;}
  }
  .result-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4)0%,transparent 55%);pointer-events:none;z-index:1;}
  /* キラリシャイン */
  .result-card::after{content:'';position:absolute;top:-60%;left:-70%;width:55%;height:220%;background:rgba(255,255,255,.3);transform:skewX(-20deg);transition:left .55s ease;pointer-events:none;z-index:2;}
  .result-card:hover::after{left:140%;}
  .result-card.card-a{background:linear-gradient(145deg,#FFE44D 0%,#FF7A3D 100%);}
  .result-card.card-b{background:linear-gradient(145deg,#00E5FF 0%,#3DFF8F 100%);}

  /* 常時グロー */
  .result-card.card-a.has-result{box-shadow:6px 6px 0 #222,0 0 30px rgba(255,120,0,.5),0 0 60px rgba(255,228,77,.3);}
  .result-card.card-b.has-result{box-shadow:6px 6px 0 #222,0 0 30px rgba(0,229,255,.5),0 0 60px rgba(61,255,143,.3);}

  .result-card.spinning{animation:cardFlip .55s cubic-bezier(.36,.07,.19,.97);}
  @keyframes cardFlip{
    0%  {transform:rotateY(0)scale(1);}
    30% {transform:rotateY(90deg)scale(.7);}
    60% {transform:rotateY(210deg)scale(.7);}
    80% {transform:rotateY(345deg)scale(1.12);}
    100%{transform:rotateY(360deg)scale(1);}
  }
  .result-card.pop{animation:cardPop .45s cubic-bezier(.34,1.76,.64,1);}
  @keyframes cardPop{
    0%  {transform:scale(.8);}
    60% {transform:scale(1.18);}
    100%{transform:scale(1);}
  }
  /* シェイクアニメ（ルーレット中） */
  .result-card.shaking{animation:cardShake .12s ease-in-out infinite;}
  @keyframes cardShake{
    0%,100%{transform:translateX(0);}
    25%    {transform:translateX(-4px)rotate(-1deg);}
    75%    {transform:translateX(4px)rotate(1deg);}
  }

  .card-label{font-size:clamp(.6rem,1.8vw,.78rem);font-weight:900;color:#333;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.55);padding:3px 12px;border-radius:20px;border:2px solid rgba(0,0,0,.12);position:relative;z-index:3;white-space:nowrap;}
  .number-display{font-family:'Lilita One',cursive;font-size:clamp(3.8rem,10vw,5.8rem);color:#222;line-height:1;text-shadow:4px 4px 0 rgba(0,0,0,.13);position:relative;z-index:3;}
  @media(max-width:480px){.number-display{font-size:4.4rem;}}
  .number-display.rolling{animation:numRoll .07s steps(1) infinite;}
  @keyframes numRoll{
    0%  {transform:scale(1.2)translateY(-8px);}
    100%{transform:scale(.8)translateY(8px);}
  }
  .direction-display{font-size:clamp(1rem,3vw,1.3rem);font-weight:900;color:#333;background:rgba(255,255,255,.65);padding:4px 13px;border-radius:20px;border:2.5px solid #222;display:flex;align-items:center;gap:5px;position:relative;z-index:3;white-space:nowrap;}

  /* ====== AND バッジ ====== */
  .and-badge{
    font-family:'Lilita One',cursive;
    font-size:clamp(1rem,3.5vw,1.6rem);color:white;
    background:linear-gradient(135deg,#FF4F9B,#C084FC);
    border:4px solid #222;border-radius:50px;padding:8px 14px;
    white-space:nowrap;display:flex;align-items:center;justify-content:center;
    box-shadow:5px 5px 0 #222;
    animation:andPulse 1.3s ease-in-out infinite;flex-shrink:0;
  }
  @keyframes andPulse{
    0%,100%{transform:scale(1)rotate(-6deg);box-shadow:5px 5px 0 #222;}
    50%    {transform:scale(1.22)rotate(6deg);box-shadow:9px 9px 0 #222;filter:drop-shadow(0 0 10px rgba(255,79,155,.8));}
  }
  @media(max-width:480px){
    .and-badge{padding:8px 20px;font-size:1.1rem;}
    @keyframes andPulse{
      0%,100%{transform:scale(1);box-shadow:5px 5px 0 #222;}
      50%    {transform:scale(1.14);box-shadow:8px 8px 0 #222;}
    }
  }

  /* ====== ボタン群 ====== */
  .btn-row{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}

  .generate-btn{
    font-family:'Lilita One',cursive;
    font-size:clamp(1.2rem,4.5vw,1.7rem);color:#fff;
    background:linear-gradient(135deg,#FF4F9B,#FF7A3D);
    border:4px solid #222;border-radius:60px;
    padding:clamp(14px,3vw,20px) clamp(36px,9vw,70px);
    cursor:pointer;box-shadow:7px 7px 0 #222;
    position:relative;overflow:hidden;letter-spacing:2px;
    transition:transform .12s,box-shadow .12s,filter .2s;
    text-shadow:1px 1px 0 rgba(0,0,0,.25);
    touch-action:manipulation;width:min(340px,88vw);
    animation:btnGlow 2s ease-in-out infinite;
  }
  @keyframes btnGlow{
    0%,100%{filter:drop-shadow(0 0 6px rgba(255,79,155,.5));}
    50%    {filter:drop-shadow(0 0 18px rgba(255,79,155,.9));}
  }
  .generate-btn:hover:not(:disabled){transform:translate(-3px,-3px);box-shadow:10px 10px 0 #222;}
  .generate-btn:active:not(:disabled){transform:translate(5px,5px);box-shadow:2px 2px 0 #222;}
  .generate-btn:disabled{opacity:.65;cursor:not-allowed;animation:none;}
  .generate-btn .shine{position:absolute;top:-50%;left:-75%;width:50%;height:220%;background:rgba(255,255,255,.32);transform:skewX(-20deg);transition:left .5s ease;pointer-events:none;}
  .generate-btn:hover:not(:disabled) .shine{left:135%;}

  /* スクショ保存ボタン */
  .save-btn{
    font-family:'Lilita One',cursive;
    font-size:clamp(1rem,3.8vw,1.3rem);color:#222;
    background:linear-gradient(135deg,#FFE44D,#FF7A3D);
    border:4px solid #222;border-radius:60px;
    padding:clamp(10px,2.5vw,14px) clamp(28px,7vw,52px);
    cursor:pointer;box-shadow:5px 5px 0 #222;
    position:relative;overflow:hidden;letter-spacing:1px;
    transition:transform .12s,box-shadow .12s;
    touch-action:manipulation;width:min(280px,80vw);
    display:none; /* 結果が出たら表示 */
  }
  .save-btn.visible{display:block;animation:saveBtnAppear .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes saveBtnAppear{
    0%  {transform:scale(0)rotate(-10deg);opacity:0;}
    100%{transform:scale(1)rotate(0deg);opacity:1;}
  }
  .save-btn:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:7px 7px 0 #222;}
  .save-btn:active:not(:disabled){transform:translate(3px,3px);box-shadow:2px 2px 0 #222;}
  .save-btn .shine{position:absolute;top:-50%;left:-75%;width:50%;height:220%;background:rgba(255,255,255,.35);transform:skewX(-20deg);transition:left .5s ease;pointer-events:none;}
  .save-btn:hover .shine{left:135%;}

  /* ====== ファイト！！バナー ====== */
  .fight-banner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:500;pointer-events:none;opacity:0;padding:0 10px;}
  .fight-banner.show{animation:fightShow 2.3s cubic-bezier(.22,1,.36,1) forwards;}
  @keyframes fightShow{
    0%  {opacity:0;transform:scale(.15)rotate(-18deg);}
    12% {opacity:1;transform:scale(1.4)rotate(6deg);}
    24% {transform:scale(.9)rotate(-3deg);}
    36% {transform:scale(1.12)rotate(2deg);}
    50% {transform:scale(1)rotate(0deg);opacity:1;}
    75% {opacity:1;transform:scale(1);}
    100%{opacity:0;transform:scale(1.6)rotate(10deg);}
  }
  .fight-text{
    font-family:'Lilita One',cursive;
    font-size:clamp(3.5rem,16vw,12rem);
    color:#FFE44D;
    -webkit-text-stroke:clamp(3px,1vw,7px) #222;
    text-shadow:8px 8px 0 #FF4F9B,16px 16px 0 #222;
    letter-spacing:3px;white-space:nowrap;
    filter:drop-shadow(0 0 50px rgba(255,228,77,1)) drop-shadow(0 0 100px rgba(255,79,155,.6));
  }

  /* ====== ヒント ====== */
  .hint-text{
    font-size:clamp(.8rem,3vw,1rem);font-weight:900;color:#999;
    letter-spacing:1px;min-height:1.5em;transition:color .3s;
    text-align:center;padding:0 12px;
  }
  .hint-text.result{color:#FF4F9B;animation:hintPop .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes hintPop{0%{transform:scale(.78);}100%{transform:scale(1);}}

  /* ====== フラッシュ ====== */
  .flash{position:fixed;inset:0;background:white;z-index:400;pointer-events:none;opacity:0;}
  .flash.go{animation:flashOut .4s ease-out forwards;}
  @keyframes flashOut{0%{opacity:.95;}100%{opacity:0;}}

  /* ====== 多重フラッシュ（カラー） ====== */
  .color-flash{position:fixed;inset:0;z-index:399;pointer-events:none;opacity:0;}
  .color-flash.go{animation:colorFlashOut .6s ease-out forwards;}
  @keyframes colorFlashOut{0%{opacity:.4;}100%{opacity:0;}}

  /* ====== 紙吹雪 ====== */
  .confetti-piece{position:fixed;top:-20px;pointer-events:none;z-index:600;animation:confettiFall linear forwards;}
  @keyframes confettiFall{
    0%  {transform:translateY(0)rotate(0deg)scaleX(1);opacity:1;}
    80% {opacity:1;}
    100%{transform:translateY(110vh)rotate(var(--spin))scaleX(var(--flip));opacity:0;}
  }

  /* ====== 保存プレビューオーバーレイ ====== */
  .save-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    padding:20px;
  }
  .save-overlay.hidden{display:none;}
  .save-overlay img{max-width:min(480px,90vw);max-height:60dvh;border:4px solid #FFE44D;border-radius:16px;box-shadow:0 0 40px rgba(255,228,77,.6);}
  .save-overlay-title{font-family:'Lilita One',cursive;color:#FFE44D;font-size:1.4rem;text-shadow:2px 2px 0 #222;letter-spacing:2px;}
  .save-overlay-hint{font-family:'Nunito',sans-serif;color:#fff;font-size:.85rem;font-weight:700;text-align:center;opacity:.8;}
  .overlay-btn-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .overlay-dl-btn{
    font-family:'Lilita One',cursive;font-size:1.1rem;color:#222;
    background:linear-gradient(135deg,#FFE44D,#FF7A3D);
    border:3px solid #222;border-radius:50px;padding:12px 32px;
    cursor:pointer;box-shadow:4px 4px 0 #222;touch-action:manipulation;
  }
  .overlay-dl-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #222;}
  .overlay-close-btn{
    font-family:'Lilita One',cursive;font-size:1.1rem;color:#fff;
    background:#555;border:3px solid #222;border-radius:50px;padding:12px 32px;
    cursor:pointer;box-shadow:4px 4px 0 #222;touch-action:manipulation;
  }
  .overlay-close-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #222;}

  /* ====== キャプチャ用スナップショットエリア ====== */
  #snapshot-area{
    position:fixed;left:-9999px;top:0;
    width:600px;
    background:var(--bg);
    padding:40px 48px;
    display:flex;flex-direction:column;align-items:center;gap:28px;
    font-family:'Nunito',sans-serif;
    border:6px solid #222;
  }
  #snapshot-area .snap-title{
    font-family:'Lilita One',cursive;
    font-size:4rem;letter-spacing:6px;
    background:linear-gradient(90deg,#FF4F9B,#FF7A3D,#FFE44D,#3DFF8F,#00E5FF,#C084FC);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(3px 3px 0 rgba(0,0,0,.18));
  }
  #snapshot-area .snap-cards{display:flex;gap:28px;align-items:center;justify-content:center;}
  #snapshot-area .snap-card{
    border:4px solid #222;border-radius:24px;
    width:180px;height:210px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    position:relative;overflow:hidden;
  }
  #snapshot-area .snap-card.snap-a{background:linear-gradient(145deg,#FFE44D,#FF7A3D);}
  #snapshot-area .snap-card.snap-b{background:linear-gradient(145deg,#00E5FF,#3DFF8F);}
  #snapshot-area .snap-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.38)0%,transparent 55%);pointer-events:none;}
  #snapshot-area .snap-label{font-size:.7rem;font-weight:900;color:#333;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,.55);padding:3px 12px;border-radius:20px;border:2px solid rgba(0,0,0,.12);position:relative;z-index:1;}
  #snapshot-area .snap-num{font-family:'Lilita One',cursive;font-size:5rem;color:#222;line-height:1;text-shadow:4px 4px 0 rgba(0,0,0,.13);position:relative;z-index:1;}
  #snapshot-area .snap-dir{font-size:1.2rem;font-weight:900;color:#333;background:rgba(255,255,255,.65);padding:4px 14px;border-radius:20px;border:2.5px solid #222;position:relative;z-index:1;}
  #snapshot-area .snap-and{font-family:'Lilita One',cursive;font-size:1.4rem;color:white;background:linear-gradient(135deg,#FF4F9B,#C084FC);border:4px solid #222;border-radius:50px;padding:8px 16px;box-shadow:4px 4px 0 #222;}
  #snapshot-area .snap-footer{font-size:.75rem;color:#aaa;font-weight:700;letter-spacing:3px;text-transform:uppercase;}

  /* カード内ラッパー */
  .card-inner{display:contents;}
  @media(max-width:480px){
    .card-inner{display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;z-index:3;}
    .result-card .card-label,.result-card .number-display,.result-card .direction-display{position:static;}
  }
</style>
</head>
<body>

<!-- 背景レイヤー -->
<div class="bg-rings" id="bgRings"></div>
<div class="bubbles"  id="bubbles"></div>
<div class="stars"    id="stars"></div>
<div class="lasers"   id="lasers"></div>

<!-- エフェクト -->
<div class="particles-container" id="particles"></div>
<div class="flash"       id="flash"></div>
<div class="color-flash" id="colorFlash"></div>
<div class="fight-banner" id="fightBanner"><span class="fight-text">ファイト！！</span></div>

<!-- 保存オーバーレイ -->
<div class="save-overlay hidden" id="saveOverlay">
  <div class="save-overlay-title">📸 スクリーンショット</div>
  <img id="previewImg" src="" alt="preview">
  <div class="save-overlay-hint">長押し（iOS）またはダウンロードボタンで保存できます</div>
  <div class="overlay-btn-row">
    <button class="overlay-dl-btn" onclick="downloadImg()">💾 ダウンロード</button>
    <button class="overlay-close-btn" onclick="closeOverlay()">✕ 閉じる</button>
  </div>
</div>

<!-- キャプチャ用（画面外） -->
<div id="snapshot-area">
  <div class="snap-title">FocusGold</div>
  <div class="snap-cards">
    <div class="snap-card snap-a">
      <div class="snap-label">一問目</div>
      <div class="snap-num" id="snapNumA">?</div>
      <div class="snap-dir" id="snapDirA">?</div>
    </div>
    <div class="snap-and">and</div>
    <div class="snap-card snap-b">
      <div class="snap-label">二問目</div>
      <div class="snap-num" id="snapNumB">?</div>
      <div class="snap-dir" id="snapDirB">?</div>
    </div>
  </div>
  <div class="snap-footer">FocusGold Random Generator</div>
</div>

<!-- メインUI -->
<div class="container">
  <div class="title-wrap">
    <div class="title-glow"></div>
    <h1>FocusGold</h1>
    <div class="subtitle">Random Generator</div>
  </div>

  <div class="cards-row">
    <div class="result-card card-a" id="cardA">
      <div class="card-inner">
        <div class="card-label">一問目</div>
        <div class="number-display" id="numA">?</div>
        <div class="direction-display"><span id="arrowA">❓</span><span id="dirTextA">?</span></div>
      </div>
    </div>

    <div class="and-badge">and</div>

    <div class="result-card card-b" id="cardB">
      <div class="card-inner">
        <div class="card-label">二問目</div>
        <div class="number-display" id="numB">?</div>
        <div class="direction-display"><span id="arrowB">❓</span><span id="dirTextB">?</span></div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      <span class="shine"></span>🎰 生成する！
    </button>
    <button class="save-btn" id="saveBtn" onclick="captureResult()">
      <span class="shine"></span>📸 写真として保存
    </button>
  </div>

  <p class="hint-text" id="hintText">ボタンを押してランダム生成！</p>
</div>

<script>
const palette=['#FFE44D','#FF7A3D','#FF4F9B','#00E5FF','#3DFF8F','#C084FC'];

/* ====== 背景ネオンリング ====== */
const ringsEl=document.getElementById('bgRings');
const ringColors=['rgba(255,79,155,.6)','rgba(255,228,77,.6)','rgba(0,229,255,.6)','rgba(61,255,143,.6)','rgba(192,132,252,.6)'];
for(let i=0;i<6;i++){
  const r=document.createElement('div'); r.className='bg-ring';
  const size=Math.random()*300+150;
  r.style.cssText=`width:${size}px;height:${size}px;border-color:${ringColors[i%ringColors.length]};animation-duration:${Math.random()*6+5}s;animation-delay:${Math.random()*6}s;`;
  ringsEl.appendChild(r);
}

/* ====== バブル ====== */
const bubblesEl=document.getElementById('bubbles');
for(let i=0;i<20;i++){
  const b=document.createElement('div'); b.className='bubble';
  const size=Math.random()*85+20;
  b.style.cssText=`width:${size}px;height:${size}px;background:${palette[i%palette.length]};left:${Math.random()*100}%;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*12}s;border:2px solid rgba(0,0,0,.06)`;
  bubblesEl.appendChild(b);
}

/* ====== 星 ====== */
const starsEl=document.getElementById('stars');
for(let i=0;i<28;i++){
  const s=document.createElement('div'); s.className='star';
  const size=Math.random()*14+4;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;background:${palette[Math.floor(Math.random()*palette.length)]};animation-duration:${Math.random()*2.5+1}s;animation-delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

/* ====== レーザー ====== */
const lasersEl=document.getElementById('lasers');
for(let i=0;i<5;i++){
  const l=document.createElement('div'); l.className='laser';
  l.style.cssText=`top:${Math.random()*100}%;width:${Math.random()*40+30}%;left:0;animation-duration:${Math.random()*4+3}s;animation-delay:${Math.random()*5}s;opacity:${Math.random()*.5+.3};`;
  lasersEl.appendChild(l);
}

/* ====== パーティクル ====== */
function spawnParticles(x,y,count=40){
  const c=document.getElementById('particles');
  for(let i=0;i<count;i++){
    const p=document.createElement('div'); p.className='particle';
    const size=Math.random()*18+6;
    const angle=(360/count)*i+Math.random()*14;
    const dist=Math.random()*240+80;
    const tx=Math.cos(angle*Math.PI/180)*dist;
    const ty=Math.sin(angle*Math.PI/180)*dist;
    const rot=Math.random()*720-360;
    const br=['50%','0%','4px'][Math.floor(Math.random()*3)];
    p.style.cssText=`width:${size}px;height:${size}px;background:${palette[Math.floor(Math.random()*palette.length)]};left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;border-radius:${br};animation-duration:${Math.random()*.55+.6}s;animation-delay:${Math.random()*.08}s;`;
    c.appendChild(p); setTimeout(()=>p.remove(),1400);
  }
}

/* ====== 大量紙吹雪 ====== */
function spawnConfetti(count=120){
  const colors=[...palette,'#fff','#222'];
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const c=document.createElement('div'); c.className='confetti-piece';
      const w=Math.random()*14+5, h=Math.random()*24+8;
      c.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*colors.length)]};--spin:${Math.random()*1200-600}deg;--flip:${Math.random()<.5?-1:1};animation-duration:${Math.random()*2+1.2}s;border:1.5px solid rgba(0,0,0,.12);border-radius:${Math.random()<.3?'50%':'3px'};`;
      document.body.appendChild(c); setTimeout(()=>c.remove(),3500);
    },Math.random()*800);
  }
}

/* ====== マルチフラッシュ ====== */
function flashScreen(){
  const f=document.getElementById('flash');
  f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  // カラーフラッシュも
  const cf=document.getElementById('colorFlash');
  const col=palette[Math.floor(Math.random()*palette.length)];
  cf.style.background=col;
  cf.classList.remove('go'); void cf.offsetWidth; cf.classList.add('go');
  // 2回目フラッシュ
  setTimeout(()=>{
    f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');
  },200);
}

/* ====== ファイト！！ ====== */
function showFight(){
  const b=document.getElementById('fightBanner');
  b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
}

/* ====== 画面全体パーティクル爆発 ====== */
function fullScreenParticles(){
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  spawnParticles(cx,cy,60);
  setTimeout(()=>{spawnParticles(0,0,20);spawnParticles(window.innerWidth,0,20);},150);
  setTimeout(()=>{spawnParticles(0,window.innerHeight,20);spawnParticles(window.innerWidth,window.innerHeight,20);},300);
}

/* ====== メイン生成 ====== */
let rolling=false;
let currentResult={nA:null,nB:null,dA:null,dB:null};

function generate(){
  if(rolling)return; rolling=true;
  const btn=document.getElementById('generateBtn');
  const numAEl=document.getElementById('numA'),numBEl=document.getElementById('numB');
  const arrowA=document.getElementById('arrowA'),arrowB=document.getElementById('arrowB');
  const dirA=document.getElementById('dirTextA'),dirB=document.getElementById('dirTextB');
  const cardA=document.getElementById('cardA'),cardB=document.getElementById('cardB');
  const hint=document.getElementById('hintText');
  const saveBtn=document.getElementById('saveBtn');

  btn.disabled=true;
  saveBtn.classList.remove('visible');
  hint.classList.remove('result');
  hint.textContent='🎰 生成中...';

  // カードのグロー消す
  cardA.classList.remove('has-result','pop'); cardB.classList.remove('has-result','pop');

  ['spinning','shaking'].forEach(c=>{cardA.classList.remove(c);cardB.classList.remove(c);});
  void cardA.offsetWidth;
  cardA.classList.add('spinning'); cardB.classList.add('spinning');
  setTimeout(()=>{cardA.classList.remove('spinning');cardB.classList.remove('spinning');cardA.classList.add('shaking');cardB.classList.add('shaking');},560);

  numAEl.classList.add('rolling'); numBEl.classList.add('rolling');
  arrowA.textContent='❓'; arrowB.textContent='❓';
  dirA.textContent='...'; dirB.textContent='...';

  let count=0;
  const iv=setInterval(()=>{
    numAEl.textContent=Math.floor(Math.random()*7)+1;
    numBEl.textContent=Math.floor(Math.random()*7)+1;
    if(++count>26){clearInterval(iv);finalize();}
  },50);

  function finalize(){
    numAEl.classList.remove('rolling'); numBEl.classList.remove('rolling');
    cardA.classList.remove('shaking'); cardB.classList.remove('shaking');

    const nA=Math.floor(Math.random()*7)+1;
    const nB=Math.floor(Math.random()*7)+1;
    const dA=Math.random()<.5?'上':'下';
    const dB=Math.random()<.5?'上':'下';
    currentResult={nA,nB,dA,dB};

    numAEl.textContent=nA; numBEl.textContent=nB;
    arrowA.textContent=dA==='上'?'⬆️':'⬇️';
    arrowB.textContent=dB==='上'?'⬆️':'⬇️';
    dirA.textContent=dA; dirB.textContent=dB;

    void cardA.offsetWidth;
    cardA.classList.add('pop','has-result'); cardB.classList.add('pop','has-result');

    const aR=cardA.getBoundingClientRect();
    const bR=cardB.getBoundingClientRect();
    const btnR=btn.getBoundingClientRect();

    flashScreen();
    spawnParticles(aR.left+aR.width/2,aR.top+aR.height/2,48);
    setTimeout(()=>spawnParticles(bR.left+bR.width/2,bR.top+bR.height/2,48),100);
    setTimeout(()=>spawnParticles(btnR.left+btnR.width/2,btnR.top+btnR.height/2,30),200);
    setTimeout(fullScreenParticles,350);
    setTimeout(()=>spawnConfetti(130),160);
    setTimeout(showFight,300);

    hint.textContent=`一問目: ${nA}-${dA}　　二問目: ${nB}-${dB}`;
    setTimeout(()=>hint.classList.add('result'),60);

    // 保存ボタンを表示
    setTimeout(()=>saveBtn.classList.add('visible'),800);

    btn.disabled=false; rolling=false;
  }
}

/* ====== スクリーンショット ====== */
let capturedDataURL=null;

async function captureResult(){
  if(!currentResult.nA)return;

  // スナップショット用要素を更新
  document.getElementById('snapNumA').textContent=currentResult.nA;
  document.getElementById('snapDirA').textContent=(currentResult.dA==='上'?'⬆️ ':'⬇️ ')+currentResult.dA;
  document.getElementById('snapNumB').textContent=currentResult.nB;
  document.getElementById('snapDirB').textContent=(currentResult.dB==='上'?'⬆️ ':'⬇️ ')+currentResult.dB;

  const el=document.getElementById('snapshot-area');
  el.style.left='0';el.style.top='0';el.style.zIndex='900';
  el.style.position='fixed';

  try{
    const canvas=await html2canvas(el,{
      backgroundColor:'#FFF8E8',
      scale:2,
      useCORS:true,
      logging:false,
    });
    capturedDataURL=canvas.toDataURL('image/png');

    // 元に戻す
    el.style.left='-9999px';el.style.position='fixed';el.style.zIndex='';

    // プレビュー表示
    document.getElementById('previewImg').src=capturedDataURL;
    document.getElementById('saveOverlay').classList.remove('hidden');
  }catch(e){
    el.style.left='-9999px';
    alert('スクリーンショットの生成に失敗しました。');
  }
}

function downloadImg(){
  if(!capturedDataURL)return;
  const a=document.createElement('a');
  const now=new Date();
  const ts=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  a.download=`FocusGold_${ts}.png`;
  a.href=capturedDataURL;
  a.click();
}

function closeOverlay(){
  document.getElementById('saveOverlay').classList.add('hidden');
}

/* ====== キーボード ====== */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();generate();}
  if(e.code==='Escape')closeOverlay();
});
</script>
</body>
</html>
